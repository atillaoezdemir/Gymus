<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Gymus">
  <meta name="description" content="Personal gym session tracker — offline and private.">
  <title>Gymus</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════════
       DESIGN SYSTEM
    ═══════════════════════════════════════════════ */
    :root {
      --bg: #FAF9F6;
      --bg-card: #FFFFFF;
      --bg-card-alt: #F3F1EC;
      --text-primary: #2C2A27;
      --text-secondary: #7A7570;
      --text-muted: #B5B0AA;
      --accent: #7D9B76;
      --accent-dark: #5C7A54;
      --accent-warm: #A89070;
      --danger: #C0675A;
      --danger-light: #F9ECEB;
      --border: #E8E4DE;
      --border-strong: #D0CBC2;
      --shadow-sm: 0 1px 4px rgba(44, 42, 39, 0.06);
      --shadow: 0 3px 14px rgba(44, 42, 39, 0.09);
      --shadow-lg: 0 10px 40px rgba(44, 42, 39, 0.14);
      --radius: 18px;
      --radius-sm: 12px;
      --radius-xs: 8px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
      height: 100%;
    }

    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Prevent iOS auto-zoom on inputs */
    input,
    textarea,
    select {
      font-size: 16px !important;
      font-family: inherit;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
    }

    /* Scrollable containers */
    .scrollable {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
    }

    /* ── Header ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }

    .app-logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }

    .app-logo span {
      color: var(--accent);
    }

    .header-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: var(--text-primary);
      transition: background 150ms;
      -webkit-tap-highlight-color: transparent;
    }

    .icon-btn:active {
      background: var(--bg-card-alt);
    }

    /* ── Nav dots (active view indicator) ── */
    .nav-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .nav-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border-strong);
      transition: all 200ms;
    }

    .nav-dot.active {
      background: var(--text-primary);
      transform: scale(1.3);
    }

    /* ── Menu overlay ── */
    .menu-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(44, 42, 39, 0.35);
      z-index: 200;
      backdrop-filter: blur(3px);
    }

    .menu-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 270px;
      background: var(--bg-card);
      z-index: 201;
      padding: 0 0 40px;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
    }

    .menu-header {
      padding: 24px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .menu-logo {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .menu-logo span {
      color: var(--accent);
    }

    .menu-items {
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 500;
      transition: background 150ms;
      -webkit-tap-highlight-color: transparent;
    }

    .menu-item:active,
    .menu-item.active {
      background: #EFF3EE;
      color: var(--accent-dark);
    }

    .menu-item-icon {
      font-size: 20px;
      width: 24px;
      text-align: center;
    }

    /* ── Main content area ── */
    .main-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      padding: 20px 16px;
      padding-bottom: max(40px, calc(env(safe-area-inset-bottom) + 20px));
    }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }

    .card+.card,
    .card+.btn,
    .btn+.btn,
    .btn+.card {
      margin-top: 12px;
    }

    /* ── Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 52px;
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 600;
      width: 100%;
      transition: opacity 150ms, transform 100ms;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      opacity: 0.8;
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.45;
      pointer-events: none;
    }

    .btn-primary {
      background: var(--text-primary);
      color: var(--bg);
    }

    .btn-accent {
      background: var(--accent);
      color: #fff;
    }

    .btn-outline {
      background: transparent;
      color: var(--text-primary);
      border: 1.5px solid var(--border-strong);
    }

    .btn-ghost {
      background: var(--bg-card-alt);
      color: var(--text-secondary);
    }

    .btn-danger {
      background: var(--danger-light);
      color: var(--danger);
    }

    .btn-sm {
      min-height: 40px;
      font-size: 14px;
      padding: 10px 16px;
    }

    /* ── Inputs ── */
    .input {
      width: 100%;
      background: var(--bg-card-alt);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 16px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 150ms;
      min-height: 52px;
    }

    .input:focus {
      border-color: var(--accent);
    }

    .input::placeholder {
      color: var(--text-muted);
    }



    /* ── Section titles ── */
    .section-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .section-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ── Drum Picker ── */
    .drum-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 110px;
      position: relative;
      gap: 32px;
      /* Set standard picker item spacing here */
    }

    .drum-item {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 100px;
    }

    .drum-side {
      font-size: 28px;
      font-weight: 300;
      color: var(--text-muted);
      opacity: 0.5;
    }

    .drum-center-val {
      font-size: 68px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -2px;
      line-height: 1;
    }

    .drum-center-box {
      min-width: 160px;
    }

    .drum-unit {
      font-size: 20px;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0;
    }

    .drum-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* ── Compact Drum (--small) ── */
    .drum-small .drum-container {
      height: 50px;
      gap: 32px;
      /* Set small picker item spacing here */
    }

    .drum-small .drum-center-val {
      font-size: 32px;
    }

    .drum-center-box-small {
      min-width: 80px;
    }

    .drum-small .drum-side {
      font-size: 20px;
    }

    .drum-small .drum-item {
      min-width: 60px;
    }

    /* ── Set indicator ── */
    .set-indicator {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .set-dot {
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      transition: all 200ms;
      min-width: 26px;
      flex: 1;
      max-width: 48px;
    }

    .set-dot.done {
      background: var(--accent);
    }

    .set-dot.active {
      background: var(--text-primary);
    }

    .set-dot.skipped {
      background: var(--text-muted);
    }

    /* ── Session header ── */
    .session-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .timer-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .timer-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .timer-value {
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
      line-height: 1.2;
    }

    /* ── Previous data card ── */
    .prev-data-card {
      background: var(--bg-card-alt);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin: 0 16px 12px;
    }

    .prev-data-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .prev-set-row {
      display: flex;
      gap: 10px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .prev-set-main {
      font-size: 22px;
      font-weight: 700;
    }

    .prev-set-rpe {
      font-size: 15px;
      color: var(--text-secondary);
    }

    /* ── Completed sets ── */
    .completed-sets {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .completed-set-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .completed-set-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .completed-set-num.skipped {
      background: var(--border-strong);
      color: var(--text-muted);
    }

    .completed-set-data {
      flex: 1;
      font-size: 15px;
      font-weight: 500;
    }

    /* ── Note area ── */
    .note-area {
      background: #FFFEF2;
      border: 1.5px solid #E5DDB0;
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin: 0 16px 12px;
    }

    .note-area textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-size: 14px;
      color: var(--text-primary);
      min-height: 52px;
      font-family: inherit;
      line-height: 1.5;
    }

    /* ── Overlays ── */
    .overlay-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(44, 42, 39, 0.45);
      z-index: 400;
      backdrop-filter: blur(2px);
    }

    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg-card);
      border-radius: var(--radius) var(--radius) 0 0;
      z-index: 401;
      padding: 16px 20px;
      padding-bottom: max(32px, env(safe-area-inset-bottom));
      max-height: 75vh;
      overflow-y: auto;
    }

    .bottom-sheet-handle {
      width: 40px;
      height: 4px;
      background: var(--border-strong);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    /* ── Panel (full-screen card) ── */
    .panel-heading {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 12px;
      text-align: center;
    }

    .panel-subtext {
      font-size: 15px;
      color: var(--text-secondary);
      margin-top: 8px;
      text-align: center;
    }

    /* ── Exercise row ── */
    .exercise-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .exercise-row:last-child {
      border-bottom: none;
    }

    .exercise-row-name {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
    }

    /* ── Analytics ── */
    .chart-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .chart-tabs::-webkit-scrollbar {
      display: none;
    }

    .chart-tab {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      background: var(--bg-card-alt);
      color: var(--text-secondary);
      transition: all 150ms;
      -webkit-tap-highlight-color: transparent;
    }

    .chart-tab.active {
      background: var(--text-primary);
      color: var(--bg);
    }

    /* ── Log browser ── */
    .log-item {
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-card);
      margin-bottom: 8px;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    .log-date {
      font-size: 16px;
      font-weight: 600;
    }

    .log-meta {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .log-body {
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }

    /* ── Transitions ── */
    .fade-enter-active,
    .fade-leave-active {
      transition: opacity 180ms ease;
    }

    .fade-enter-from,
    .fade-leave-to {
      opacity: 0;
    }

    .slide-up-enter-active,
    .slide-up-leave-active {
      transition: all 200ms ease;
    }

    .slide-up-enter-from {
      opacity: 0;
      transform: translateY(20px);
    }

    .slide-up-leave-to {
      opacity: 0;
      transform: translateY(-12px);
    }

    .slide-right-enter-active,
    .slide-right-leave-active {
      transition: all 200ms ease;
    }

    .slide-right-enter-from {
      opacity: 0;
      transform: translateX(32px);
    }

    .slide-right-leave-to {
      opacity: 0;
      transform: translateX(-20px);
    }

    .menu-enter-active,
    .menu-leave-active {
      transition: transform 220ms ease;
    }

    .menu-enter-from {
      transform: translateX(100%);
    }

    .menu-leave-to {
      transform: translateX(100%);
    }

    /* ── Utility ── */
    .mt-1 {
      margin-top: 4px
    }

    .mt-2 {
      margin-top: 8px
    }

    .mt-3 {
      margin-top: 12px
    }

    .mt-4 {
      margin-top: 16px
    }

    .mt-6 {
      margin-top: 24px
    }

    .mb-1 {
      margin-bottom: 4px
    }

    .mb-2 {
      margin-bottom: 8px
    }

    .mb-3 {
      margin-bottom: 12px
    }

    .mb-4 {
      margin-bottom: 16px
    }

    .flex {
      display: flex
    }

    .items-center {
      align-items: center
    }

    .justify-between {
      justify-content: space-between
    }

    .gap-2 {
      gap: 8px
    }

    .gap-3 {
      gap: 12px
    }

    .text-sm {
      font-size: 14px
    }

    .text-xs {
      font-size: 12px
    }

    .text-lg {
      font-size: 18px
    }

    .text-muted {
      color: var(--text-muted)
    }

    .text-secondary {
      color: var(--text-secondary)
    }

    .text-danger {
      color: var(--danger)
    }

    .text-accent {
      color: var(--accent-dark)
    }

    .font-bold {
      font-weight: 700
    }

    .w-full {
      width: 100%
    }

    /* ── Review action buttons (delete only) ── */
    .review-action-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card-alt);
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 150ms;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .review-action-btn:active {
      background: var(--border);
      transform: scale(0.92);
    }

    .review-action-btn--danger {
      color: var(--danger);
      border-color: var(--danger-light);
    }

    .review-action-btn--danger:active {
      background: var(--danger-light);
    }

    .review-action-btn--sm {
      width: 28px;
      height: 28px;
      font-size: 12px;
      border-radius: 6px;
    }

    /* ── Drag handle (grip for reorder) ── */
    .drag-handle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      min-height: 36px;
      cursor: grab;
      touch-action: none;
      color: var(--text-muted);
      flex-shrink: 0;
      border-radius: 6px;
      transition: color 150ms, background 150ms;
      -webkit-tap-highlight-color: transparent;
    }

    .drag-handle:hover {
      color: var(--text-secondary);
      background: var(--bg-card-alt);
    }

    .drag-handle:active {
      cursor: grabbing;
      color: var(--text-primary);
      background: var(--bg-card-alt);
    }

    .drag-handle--sm {
      width: 22px;
      min-height: 28px;
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <div id="err"
    style="display:none;position:fixed;inset:0;background:#FAF9F6;z-index:9999;padding:24px;font-family:monospace;font-size:13px;color:#C0675A;white-space:pre-wrap;overflow:auto;">
  </div>
  <script>
    function showErr(msg) {
      var el = document.getElementById('err');
      if (el) { el.style.display = 'block'; el.textContent += msg + '\n\n'; }
    }
    window.onerror = function (msg, src, line, col, err) {
      showErr('[JS Error] ' + msg + '\n  at ' + src + ':' + line);
    };
    window.addEventListener('unhandledrejection', function (e) {
      showErr('[Promise] ' + (e.reason?.stack || e.reason || e));
    });
  </script>

  <script type="module">
    // ── Imports ────────────────────────────────────────────────────────────────────
    import {
      initDB, getAppState, patchAppState,
      getActiveProgram, getTemplates
    } from './db.js';

    import { DrumPicker, SetIndicator } from './components.js';
    import { SetupView } from './setup.js';
    import { SessionView } from './session.js';
    import { AnalyticsView } from './analytics.js';

    const { createApp, ref, reactive, computed, onMounted } = Vue;

    const App = {
      components: { SetupView, SessionView, AnalyticsView, DrumPicker, SetIndicator },
      setup() {
        const view = ref('session');   // 'session' | 'setup' | 'analytics'
        const menuOpen = ref(false);
        const program = ref(null);
        const templates = ref([]);
        const appState = ref(null);
        const loading = ref(true);

        async function loadData() {
          appState.value = await getAppState();
          program.value = await getActiveProgram();
          if (program.value) {
            templates.value = await getTemplates(program.value.id);
          } else {
            templates.value = [];
          }
          loading.value = false;
        }

        onMounted(async () => {
          await initDB();
          await loadData();
          // Register service worker
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js').catch(() => { });
          }
        });

        function navigate(v) { view.value = v; menuOpen.value = false; }

        async function onRefresh() { await loadData(); }
        async function onSessionDone() { await loadData(); }
        async function onSetupSaved() { await loadData(); view.value = 'session'; }
        function onGoSetup() { view.value = 'setup'; }

        const viewLabel = computed(() => ({ session: 'Session', setup: 'Setup', analytics: 'Analytics' }[view.value]));

        return { view, menuOpen, program, templates, appState, loading, navigate, onRefresh, onSessionDone, onSetupSaved, onGoSetup, viewLabel };
      },
      template: `
  <div>
    <!-- ── Loading ── -->
    <div v-if="loading" style="display:flex;align-items:center;justify-content:center;min-height:100svh;flex-direction:column;gap:16px;">
      <div style="font-size:40px;">🏋️</div>
      <p style="font-size:18px; font-weight:600; color:var(--text-secondary);">Loading Gymus…</p>
    </div>

    <template v-else>
      <!-- ── Header ── -->
      <header class="app-header">
        <span class="app-logo">Gym<span>us</span></span>
        <div class="nav-indicator">
          <div v-for="v in ['session','setup','analytics']" :key="v" :class="['nav-dot', view===v?'active':'']"></div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" @click="menuOpen=true" aria-label="Menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <line x1="3" y1="6"  x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- ── Menu ── -->
      <transition name="fade">
        <div v-if="menuOpen" class="menu-backdrop" @click="menuOpen=false"></div>
      </transition>
      <transition name="menu">
        <div v-if="menuOpen" class="menu-panel">
          <div class="menu-header">
            <span class="menu-logo">Gym<span>us</span></span>
            <button class="icon-btn" @click="menuOpen=false">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <nav class="menu-items">
            <button :class="['menu-item', view==='session'   ? 'active':'']" @click="navigate('session')">
              <span class="menu-item-icon">💪</span> Session
            </button>
            <button :class="['menu-item', view==='setup'     ? 'active':'']" @click="navigate('setup')">
              <span class="menu-item-icon">⚙️</span> Setup
            </button>
            <button :class="['menu-item', view==='analytics' ? 'active':'']" @click="navigate('analytics')">
              <span class="menu-item-icon">📊</span> Analytics
            </button>
          </nav>
          <div style="padding:0 24px;">
            <p class="text-xs text-muted" style="text-align:center; line-height:1.5;">
              All data stored on this device.<br>No account, no server, no nonsense.
            </p>
          </div>
        </div>
      </transition>

      <!-- ── Views ── -->
      <div style="flex:1; display:flex; flex-direction:column; min-height:0;">
        <transition name="fade" mode="out-in">
          <SessionView
            v-if="view==='session'"
            key="session"
            :program="program"
            :templates="templates"
            :app-state="appState"
            @session-done="onSessionDone"
            @go-setup="onGoSetup"
            @refresh="onRefresh"
          />
          <SetupView
            v-else-if="view==='setup'"
            key="setup"
            :program="program"
            :templates="templates"
            @saved="onSetupSaved"
            @refresh="onRefresh"
          />
          <AnalyticsView
            v-else-if="view==='analytics'"
            key="analytics"
          />
        </transition>
      </div>
    </template>
  </div>
  `
    };

    try {
      const app = createApp(App);
      // Surface Vue-internal errors to our visible error box
      app.config.errorHandler = (err, vm, info) => {
        showErr('[Vue Error] ' + info + '\n' + (err?.stack || err?.message || err));
      };
      app.config.warnHandler = (msg) => {
        console.warn('[Vue Warn]', msg);
      };
      app.mount('#app');
    } catch (e) {
      showErr('[Mount Error] ' + (e.stack || e.message || e));
    }
  </script>

</body>

</html>
